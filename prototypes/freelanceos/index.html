<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wipOS — Earnings</title>
  <meta name="description" content="A calm financial control center for freelancers — paid, expected, and overdue income at a glance." />

  <script>
    try {
      const stored = localStorage.getItem("wipos-theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (stored === "dark" || (!stored && prefersDark)) document.documentElement.classList.add("dark");
    } catch (_) {}
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wdth,wght@125,900&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind (Play CDN) + calm fintech theme -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', 'Inter', 'system-ui', 'sans-serif'],
            brand: ['"Google Sans Flex"', 'sans-serif'],
          },
          colors: {
            canvas: "var(--color-canvas)",
            surface: "var(--color-surface)",
            card: "var(--color-card)",
            ink: "var(--color-ink)",
            muted: "var(--color-muted)",
            faint: "var(--color-faint)",
            line: "var(--color-border)",
            "line-strong": "var(--color-border-strong)",
            "card-border": "var(--color-card-border)",
            hover: "var(--color-hover)",
            primary: "var(--color-primary)",
            "primary-fg": "var(--color-primary-fg)",
            input: "var(--color-input)",
            ring: "var(--color-ring)",
            well: "var(--color-well)",
            "well-muted": "var(--color-well-muted)",
            "well-soft": "var(--color-well-soft)",
            sidebar: {
              DEFAULT: "var(--color-sidebar)",
              foreground: "var(--color-sidebar-fg)",
              accent: "var(--color-sidebar-accent)",
              "accent-foreground": "var(--color-sidebar-fg)",
              border: "var(--color-sidebar-border)",
              ring: "var(--color-border-strong)",
            },
          },
          borderRadius: { "2xl": "1rem", "3xl": "1.375rem" },
          boxShadow: {
            card: "var(--shadow-card)",
            lift: "var(--shadow-lift)",
          },
        },
      },
    };
  </script>

  <style>
    :root {
      --color-canvas: #f5f5f7;
      --color-surface: #e8e8ed;
      --color-card: #ffffff;
      --color-ink: #1d1d1f;
      --color-muted: #6e6e73;
      --color-faint: #86868b;
      --color-border: rgba(0, 0, 0, 0.06);
      --color-border-strong: rgba(0, 0, 0, 0.08);
      --color-card-border: rgba(0, 0, 0, 0.06);
      --color-hover: rgba(0, 0, 0, 0.02);
      --color-primary: #1d1d1f;
      --color-primary-fg: #ffffff;
      --color-input: #e8e8ed;
      --color-ring: rgba(0, 0, 0, 0.12);
      --color-well: #f5f5f7;
      --color-well-muted: #f5f5f7;
      --color-well-soft: #fafafa;
      --color-hover-card: rgba(255, 255, 255, 0.8);
      --color-sidebar: #f5f5f7;
      --color-sidebar-accent: #e8e8ed;
      --color-sidebar-fg: #1d1d1f;
      --color-sidebar-border: rgba(0, 0, 0, 0.06);
      --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.03);
      --shadow-lift: 0 6px 24px rgba(0, 0, 0, 0.06);
      --scrollbar-track: #f5f5f7;
    }

    .dark {
      --color-canvas: #121214;
      --color-surface: #1c1c1e;
      --color-card: #1c1c1e;
      --color-ink: #f5f5f7;
      --color-muted: #98989d;
      --color-faint: #636366;
      --color-border: rgba(255, 255, 255, 0.08);
      --color-border-strong: rgba(255, 255, 255, 0.12);
      --color-card-border: rgba(255, 255, 255, 0.05);
      --color-hover: rgba(255, 255, 255, 0.05);
      --color-primary: #f5f5f7;
      --color-primary-fg: #1d1d1f;
      --color-input: #2c2c2e;
      --color-ring: rgba(255, 255, 255, 0.18);
      --color-well: #2c2c2e;
      --color-well-muted: #252528;
      --color-well-soft: #323234;
      --color-hover-card: rgba(28, 28, 30, 0.8);
      --color-sidebar: #121214;
      --color-sidebar-accent: #2c2c2e;
      --color-sidebar-fg: #f5f5f7;
      --color-sidebar-border: rgba(255, 255, 255, 0.08);
      --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.35), 0 1px 3px rgba(0, 0, 0, 0.25);
      --shadow-lift: 0 6px 24px rgba(0, 0, 0, 0.45);
      --scrollbar-track: #121214;
    }

    .dark body,
    .dark .bg-canvas {
      background-color: var(--color-canvas);
    }

    html { scrollbar-gutter: stable; overflow-y: scroll; }
    body {
      background: var(--color-canvas);
      color: var(--color-ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb {
      background: rgba(128, 128, 128, 0.35);
      border-radius: 999px;
      border: 2px solid var(--scrollbar-track);
    }
    .modal-scroll::-webkit-scrollbar-thumb { border: none; }
    .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    .brand-title {
      font-family: "Google Sans Flex", sans-serif;
      font-weight: 900;
      font-stretch: expanded;
      font-variation-settings: "wdth" 125, "wght" 900;
    }
    @keyframes brand-icon-dash-tick {
      0%, 11.71875% { transform: rotate(0deg); }
      12.5%, 24.21875% { transform: rotate(45deg); }
      25%, 36.71875% { transform: rotate(90deg); }
      37.5%, 49.21875% { transform: rotate(135deg); }
      50%, 61.71875% { transform: rotate(180deg); }
      62.5%, 74.21875% { transform: rotate(225deg); }
      75%, 86.71875% { transform: rotate(270deg); }
      87.5%, 99.21875% { transform: rotate(315deg); }
      100% { transform: rotate(360deg); }
    }
    .brand-icon-dash {
      transform-origin: center;
      animation: brand-icon-dash-tick 32s linear infinite;
    }
    .brand-toggle:hover .brand-icon-dash {
      animation-play-state: paused;
    }
    @media (prefers-reduced-motion: reduce) {
      .brand-icon-dash { animation: none; }
    }
    input:focus, textarea:focus, input:focus-visible, textarea:focus-visible { outline: none; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    #boot { font-family: -apple-system, Inter, system-ui, sans-serif; color: var(--color-faint); }
    .hover-card {
      border: 1px solid var(--color-border);
      background-color: var(--color-hover-card);
      box-shadow: var(--shadow-lift);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }
    .recharts-tooltip-wrapper { outline: none !important; }
    .recharts-default-tooltip {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      box-shadow: none !important;
    }
    @media (prefers-reduced-motion: no-preference) {
      html.theme-changing,
      html.theme-changing *,
      html.theme-changing *::before,
      html.theme-changing *::after {
        transition:
          background-color 0.22s ease,
          color 0.18s ease,
          border-color 0.22s ease,
          box-shadow 0.22s ease,
          fill 0.18s ease,
          stroke 0.18s ease !important;
      }
    }
    @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes overlayOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes dialogIn {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to { opacity: 1; transform: none; }
    }
    @keyframes dialogOut {
      from { opacity: 1; transform: none; }
      to { opacity: 0; transform: translateY(10px) scale(0.985); }
    }
  </style>
</head>
<body class="font-sans text-ink antialiased">
  <div id="root"></div>

  <div id="boot" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;">
    Loading wipOS…
  </div>

  <!-- Module resolution for the CDN React stack -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "cmdk": "https://esm.sh/cmdk@1.0.4?deps=react@18.3.1,react-dom@18.3.1",
        "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.3.1,react-dom@18.3.1",
        "lucide-react": "https://esm.sh/lucide-react@0.439.0?deps=react@18.3.1"
      }
    }
  </script>

  <!-- In-browser TSX transpile so the source stays clean TypeScript -->
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <script type="module">
    try {
      const markerSidebar = '/* ---- shadcn sidebar inject ---- */';
      const markerCommand = '/* ---- shadcn command inject ---- */';
      const [sidebarSrc, commandSrc, appSrc] = await Promise.all([
        fetch('./components/ui/sidebar.tsx', { cache: 'no-store' }).then((r) => r.text()),
        fetch('./components/ui/command.tsx', { cache: 'no-store' }).then((r) => r.text()),
        fetch('./app.tsx', { cache: 'no-store' }).then((r) => r.text()),
      ]);
      let source = appSrc;
      if (source.includes(markerSidebar)) source = source.replace(markerSidebar, sidebarSrc);
      else source = sidebarSrc + '\n' + source;
      if (source.includes(markerCommand)) source = source.replace(markerCommand, commandSrc);
      else source = commandSrc + '\n' + source;
      const { code } = Babel.transform(source, {
        filename: 'app.tsx',
        presets: [
          ['react', { runtime: 'classic' }],
          ['typescript', { isTSX: true, allExtensions: true, onlyRemoveTypeImports: true }],
        ],
      });
      const url = URL.createObjectURL(new Blob([code], { type: 'text/javascript' }));
      await import(url);
      document.getElementById('boot')?.remove();
    } catch (err) {
      const boot = document.getElementById('boot');
      if (boot) boot.textContent = 'Failed to load: ' + err.message;
      console.error(err);
    }
  </script>

  <!-- Faster Fixes feedback widget (self-hosted) -->
  <script type="module" src="../../scripts/faster-fixes.js" data-color="#1d1d1f" data-react="18.3.1"></script>
</body>
</html>
